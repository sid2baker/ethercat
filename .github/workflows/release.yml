name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.0"
          elixir-version: "1.19.1"

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install dependencies
        run: mix deps.get

      - name: Check tag matches package version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          package_version="$(mix run -e 'IO.write(Mix.Project.config()[:version])')"

          if [ "$version" != "$package_version" ]; then
            echo "Tag ${version} does not match mix.exs version ${package_version}" >&2
            exit 1
          fi

      - name: Create raw test veth pairs
        run: |
          sudo ip link add veth-m0 type veth peer name veth-s0
          sudo ip link add veth-m1 type veth peer name veth-s1
          sudo ip link set veth-m0 up
          sudo ip link set veth-s0 up
          sudo ip link set veth-m1 up
          sudo ip link set veth-s1 up

      - name: Grant CAP_NET_RAW to BEAM
        run: |
          BEAM=$(readlink -f "$(dirname "$(dirname "$(command -v erl)")")"/erts-*/bin/beam.smp)
          sudo setcap cap_net_raw+ep "$BEAM"
          getcap "$BEAM"

      - name: Run tests
        env:
          MIX_ENV: test
        run: mix do compile --warnings-as-errors, test --warnings-as-errors

      - name: Build docs
        env:
          MIX_ENV: dev
        run: mix docs.fresh

      - name: Build Hex package
        env:
          MIX_ENV: dev
        run: mix hex.build

      - name: Extract release notes from changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"

          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" {in_section=1; next}
            in_section && $0 ~ "^## \\[" {exit}
            in_section {print}
          ' CHANGELOG.md > release-notes.md

          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "No changelog section found for ${version}" >&2
            exit 1
          fi

      - name: Create draft GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create \
            "${GITHUB_REF_NAME}" \
            --draft \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
