name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "v*.*"

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    env:
      MIX_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.0"
          elixir-version: "1.19.1"

      - name: Cache Mix
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/.hex/packages
          key: ${{ runner.os }}-mix-otp-28.0-elixir-1.19.1-${{ hashFiles('mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Check compilation warnings
        run: mix compile --warnings-as-errors

      - name: Create raw test veth pairs
        run: |
          sudo ip link add veth-m0 type veth peer name veth-s0
          sudo ip link add veth-m1 type veth peer name veth-s1
          sudo ip link set veth-m0 up
          sudo ip link set veth-s0 up
          sudo ip link set veth-m1 up
          sudo ip link set veth-s1 up

      - name: Grant CAP_NET_RAW to BEAM
        run: |
          BEAM=$(readlink -f "$(dirname "$(dirname "$(command -v erl)")")"/erts-*/bin/beam.smp)
          sudo setcap cap_net_raw+ep "$BEAM"
          getcap "$BEAM"

      - name: Run tests
        run: mix test --warnings-as-errors
